<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Manage-Cars - Clients</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/desktop.css" />
</head>
<body class="light">
    <div id="crmLoader" class="crm-loader" aria-hidden="true">
        <div class="loader-card">
            <div class="loader-icon"><i class="fa-solid fa-users" aria-hidden="true"></i></div>
            <div class="loader-title">Manage Cars</div>
            <div class="loader-sub">Loading Clients...</div>
            <div class="loader-animation">
                <div class="spinner-section">
                    <div class="circle-spin"></div>
                    <div class="dot-pulse"><span></span><span></span><span></span></div>
                </div>
                <div class="progress-track"><div class="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="toast" role="alert" aria-live="polite"></div>
    
    <main id="app">
        <section class="screen active" id="clients-list" aria-label="Clients Management">
            <div class="screen-header">
                <h2><i class="fa-solid fa-users" aria-hidden="true"></i> Clients</h2>
                <div class="header-stats" id="clients-count"></div>
                <button type="button" class="btn-add-client desktop-add-btn" id="add-client-btn" data-action="add">
                    <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Client
                </button>
            </div>
            <div class="content" id="clients-container"></div>
        </section>
        
        <section class="screen" id="add-client" style="display: none;">
            <div class="screen-header">
                <button type="button" class="btn-back" data-action="back" data-target="clients-list">
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </button>
                <h2>Add New Client</h2>
            </div>
            <div class="content">
                <form id="add-client-form" data-form-type="add" novalidate>
                    <div class="form-group">
                        <label><i class="fa-solid fa-user"></i> Client Name <span class="required">*</span></label>
                        <input type="text" id="add-client-name" name="name" required />
                        <div class="field-error" id="add-name-error"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-envelope"></i> Email</label>
                        <input type="email" id="add-client-email" name="email" />
                        <div class="field-error" id="add-email-error"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                        <div class="phone-input-group">
                            <select id="country-code" class="country-code">
                                <option value="+20">🇪🇬 +20</option>
                                <option value="+966">🇸🇦 +966</option>
                                <option value="+971">🇦🇪 +971</option>
                            </select>
                            <input type="tel" id="add-client-phone" name="phone" />
                        </div>
                        <div class="field-error" id="add-phone-error"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-note-sticky"></i> Notes</label>
                        <textarea id="add-client-notes" name="notes" rows="3"></textarea>
                        <div class="field-error" id="add-notes-error"></div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" data-action="back" data-target="clients-list">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Client</button>
                    </div>
                </form>
            </div>
        </section>
        
        <section class="screen" id="client-details" style="display: none;">
            <div class="screen-header">
                <button type="button" class="btn-back" data-action="back" data-target="clients-list">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <h2>Client Profile</h2>
                <button type="button" class="btn-edit-header" id="edit-from-details" data-action="edit">
                    <i class="fa-solid fa-pen"></i>
                </button>
            </div>
            <div class="content" id="client-details-container"></div>
        </section>
        
        <section class="screen" id="edit-client" style="display: none;">
            <div class="screen-header">
                <button type="button" class="btn-back" data-action="back" data-target="clients-list">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <h2>Edit Client</h2>
            </div>
            <div class="content">
                <form id="edit-client-form" data-form-type="edit" novalidate>
                    <input type="hidden" id="edit-client-id" name="clientId" />
                    <div class="form-group">
                        <label><i class="fa-solid fa-user"></i> Client Name <span class="required">*</span></label>
                        <input type="text" id="edit-client-name" name="name" required />
                        <div class="field-error" id="edit-name-error"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-envelope"></i> Email</label>
                        <input type="email" id="edit-client-email" name="email" />
                        <div class="field-error" id="edit-email-error"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                        <div class="phone-input-group">
                            <select id="edit-country-code" class="country-code">
                                <option value="+20">🇪🇬 +20</option>
                                <option value="+966">🇸🇦 +966</option>
                                <option value="+971">🇦🇪 +971</option>
                            </select>
                            <input type="tel" id="edit-client-phone" name="phone" />
                        </div>
                        <div class="field-error" id="edit-phone-error"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-note-sticky"></i> Notes</label>
                        <textarea id="edit-client-notes" name="notes" rows="3"></textarea>
                        <div class="field-error" id="edit-notes-error"></div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" data-action="back" data-target="clients-list">Cancel</button>
                        <button type="submit" class="btn btn-primary">Update Client</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    
    <button type="button" class="Mood desktop" id="theme-toggle" aria-label="Toggle Theme" data-action="theme"><i class="fa-solid fa-sun"></i></button>
    
    <button type="button" class="fab mobile-fab" id="fab-add-mobile" data-action="add">
        <i class="fa-solid fa-plus"></i>
    </button>
    
    <nav class="sidebar-nav">
        <div class="sidebar-logo"><i class="fa-solid fa-car"></i><span>Manage Cars</span></div>
        <div class="desktop-nav">
            <a href="dashboard.html" class="desktop-nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="index.html" class="desktop-nav-link active"><i class="fa-solid fa-users"></i> Clients</a>
            <a href="requests.html" class="desktop-nav-link"><i class="fa-solid fa-file-lines"></i> Requests</a>
            <a href="cars.html" class="desktop-nav-link"><i class="fa-solid fa-car"></i> Cars</a>
            <a href="search.html" class="desktop-nav-link"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        </div>
        <div class="sidebar-footer">
            <button data-action="theme" type="button" class="Mood-sidebar" id="theme-toggle-desktop" data-action="theme">
                <i class="fa-solid fa-sun"></i> Theme
            </button>
        </div>
    </nav>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active"><i class="fa-solid fa-users"></i> Clients</a>
        <a href="requests.html" class="nav-link"><i class="fa-solid fa-file-lines"></i> Requests</a>
        <a href="cars.html" class="nav-link"><i class="fa-solid fa-car"></i> Cars</a>
        <a href="search.html" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
    </nav>
    
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/clients.js"></script>
</body>
</html>
